<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-label="IT设备管理平台首页工作台预览">
  <defs>
    <style>
      .bg{fill:#eef3f8}.panel{fill:#fff;stroke:#d9e2ec;stroke-width:1}.side{fill:#fff}.nav{fill:#eaf2ff}.title{fill:#17233c;font:bold 16px Arial,'Microsoft YaHei',sans-serif}.text{fill:#52627a;font:12px Arial,'Microsoft YaHei',sans-serif}.small{fill:#77879c;font:11px Arial,'Microsoft YaHei',sans-serif}.blue{fill:#2f7cf6}.green{fill:#12b981}.orange{fill:#f59e0b}.red{fill:#ef4444}.muted{fill:#f3f6fa}.line{fill:none;stroke:#e6edf5;stroke-width:1}.chart1{fill:none;stroke:#12b981;stroke-width:3}.chart2{fill:none;stroke:#3b82f6;stroke-width:3}.chart3{fill:none;stroke:#f59e0b;stroke-width:3}
    </style>
  </defs>
  <rect class="bg" width="1440" height="760"/>
