  <rect x="646" y="682" width="120" height="34" rx="4" class="muted"/><text x="686" y="704" class="title" style="font-size:12px">告警事件</text>
  <rect x="790" y="682" width="120" height="34" rx="4" class="muted"/><text x="828" y="704" class="title" style="font-size:12px">监控数据</text>

  <rect x="958" y="576" width="462" height="150" rx="4" class="panel"/>
  <text x="976" y="605" class="title">最近资产变更</text>
