services:
  registry:
    image: registry:2
    container_name: asset-registry
    restart: always
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./docker/registry/data:/var/lib/registry
    networks:
      - asset-network

networks:
  asset-network:
    driver: bridge
